image: fedora:latest

before_script:
  - dnf update -y
  - dnf install -y acl gawk which fakeroot rpm-build wget fedpkg gcc gcc-c++ make
  - umask 0022

build_rpm:
  stage: build
  script:
    - wget https://api.github.com/repos/GrapheneOS/hardened_malloc/tarball/2026040300
    - echo "1c8f11b22ac4e30fb650c3adfe17e69ddddc9319be37931bd24f718adf8b1ce2355c9da0877edd1bc8cfae4d7eaa761c62712cdd57c757a32bcc5847af5c9582  2026040300" | sha512sum -c
    - fedpkg --release f43 local
  artifacts:
    paths:
        - x86_64/hardened_malloc*.x86_64.rpm
        - hardened_malloc*.src.rpm
