image: fedora:latest

before_script:
  - dnf update -y
  - dnf install -y acl gawk which fakeroot rpm-build wget fedpkg gcc gcc-c++ make
  - umask 0022

build_rpm:
  stage: build
  script:
    - wget https://api.github.com/repos/GrapheneOS/hardened_malloc/tarball/2026032000
    - echo "96fe84743081b4f06051dc14c5925ed560cd0ef8ad59ad02c0be11cfe3dafdbdc8e09ed495ea020a3e8547cc94b67f1a2ee3e8c5dc84db809ab0389e79988b1e  2026032000" | sha512sum -c
    - fedpkg --release f43 local
  artifacts:
    paths:
        - x86_64/hardened_malloc*.x86_64.rpm
        - hardened_malloc*.src.rpm
