image: fedora:latest

before_script:
  - dnf update -y
  - dnf install -y acl gawk which fakeroot rpm-build wget fedpkg gcc gcc-c++ make
  - umask 0022

build_rpm:
  stage: build
  script:
    - wget https://api.github.com/repos/GrapheneOS/hardened_malloc/tarball/2026042100
    - echo "e2c6ba0fb1ccb550b64de15cdf483975ead202ab058dd70291b580b0b84e6d351d41924bb088069613352cdfeb4a199a8b69bd9fda1fde68d09544470fc68838  2026042100" | sha512sum -c
    - fedpkg --release f43 local
  artifacts:
    paths:
        - x86_64/hardened_malloc*.x86_64.rpm
        - hardened_malloc*.src.rpm
